<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tokenmaxxing Quest — an incremental game about maximizing LLM token spending at a big tech company.">
  <title>Tokenmaxxing Quest</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <main class="game" id="game">
    <header class="game__header">
      <h1 class="game__title">Tokenmaxxing Quest</h1>
      <p class="game__subtitle">Big Tech Corp — Software Engineer II</p>
    </header>

    <section class="panel panel--resource" aria-live="polite">
      <h2 class="panel__label">Tokens Consumed</h2>
      <p class="resource__value" id="tokens-display">0</p>
      <p class="resource__rate" id="rate-display">+0.0 / sec</p>
    </section>

    <section class="panel panel--actions">
      <button type="button" class="btn btn--primary" id="send-prompt-btn">
        Send Prompt
        <span class="btn__hint">+1 token</span>
      </button>
    </section>

    <section class="panel panel--upgrade">
      <h2 class="panel__label">Background Agent</h2>
      <p class="upgrade__desc">Runs prompts while you attend standup.</p>
      <div class="upgrade__row">
        <button type="button" class="btn btn--secondary" id="buy-agent-btn">
          Buy — <span id="agent-cost">25</span> tokens
        </button>
        <span class="upgrade__owned">Owned: <span id="agent-count">0</span></span>
      </div>
    </section>

    <section class="panel panel--achievements">
      <button
        type="button"
        class="achievements-toggle"
        id="achievements-toggle"
        aria-expanded="false"
        aria-controls="achievements-panel"
      >
        Achievements
        <span class="achievements-toggle__hint">View progress</span>
      </button>
      <div class="achievements-panel" id="achievements-panel" hidden>
        <ul class="achievements-list" id="achievements-list"></ul>
      </div>
    </section>

    <section class="panel panel--reset">
      <button
        type="button"
        class="reset-toggle"
        id="reset-toggle"
        aria-expanded="false"
        aria-controls="reset-confirm"
      >
        Reset progress
        <span class="reset-toggle__hint">Start over</span>
      </button>
      <div class="reset-confirm" id="reset-confirm" hidden>
        <p class="reset-confirm__warning">This cannot be undone. Choose a reset type:</p>
        <div class="reset-confirm__actions">
          <button type="button" class="btn btn--secondary" id="reset-new-game-btn">
            New game
            <span class="btn__hint">Keep achievements</span>
          </button>
          <button type="button" class="btn btn--danger" id="reset-full-btn">
            Full reset
            <span class="btn__hint">Clear achievements too</span>
          </button>
          <button type="button" class="btn btn--ghost" id="reset-cancel-btn">Cancel</button>
        </div>
      </div>
    </section>
  </main>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
